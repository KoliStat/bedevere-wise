<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bedevere Wise — Embed</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/x-icon" href="/duck.ico" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        height: 100%;
        width: 100%;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        font-size: 13px;
        line-height: 1.4;
        background: #1a1b26;
        color: #c0caf5;
      }
      /* Avoid the dark-on-light flash before JS picks a theme: keep the
         loader neutral so neither theme reads as a flash. The real theme
         is applied synchronously by main.ts before mount. */
      html[data-theme="light"] body { background: #e1e2e7; color: #3760bf; }
      #embed-root { width: 100%; height: 100%; overflow: hidden; }
      .embed-loading {
        display: flex; align-items: center; justify-content: center;
        height: 100%; font-size: 13px;
      }
      .embed-loading::after {
        content: "";
        width: 14px; height: 14px; margin-left: 8px;
        border: 2px solid currentColor; border-top-color: transparent;
        border-radius: 50%;
        animation: embed-spin 0.9s linear infinite;
        opacity: 0.6;
      }
      @keyframes embed-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="embed-root">
      <div class="embed-loading">Loading</div>
    </div>
    <script type="module" src="/src/embed/main.ts"></script>
  </body>
</html>
